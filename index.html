<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
}

.card{

width:90%;
max-width:420px;
background:white;
padding:35px 25px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.2);
animation:pop 1s ease;
z-index:5;

}

@keyframes pop{

0%{
transform:scale(.3);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}

}

h1{

font-size:2.2rem;
color:#ff4081;
animation:glow 2s infinite;

}

@keyframes glow{

0%,100%{
text-shadow:0 0 10px #ff4081;
}

50%{
text-shadow:0 0 25px #ff80ab;
}

}

h2{

margin-top:15px;
font-size:1.5rem;
color:#333;

}

p{

margin-top:20px;
font-size:17px;
line-height:1.6;
color:#555;

}

button{

margin-top:30px;
padding:14px 28px;
border:none;
border-radius:50px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.08);

}

#message{

margin-top:20px;
font-size:18px;
font-weight:bold;
color:#ff4081;
display:none;

}

/* Balloons */

.balloon{

position:absolute;
bottom:-150px;
width:60px;
height:80px;
border-radius:50%;
animation:float linear infinite;

}

.balloon:after{

content:"";
position:absolute;
width:2px;
height:90px;
background:white;
left:50%;
top:80px;

}

.red{
background:#ff4d4d;
left:10%;
animation-duration:8s;
}

.blue{
background:#4da6ff;
left:30%;
animation-duration:10s;
}

.green{
background:#66cc66;
left:55%;
animation-duration:9s;
}

.yellow{
background:#ffd633;
left:75%;
animation-duration:11s;
}

.purple{
background:#cc66ff;
left:90%;
animation-duration:8.5s;
}

@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}

/* Responsive */

@media(max-width:480px){

h1{
font-size:1.8rem;
}

h2{
font-size:1.3rem;
}

p{
font-size:15px;
}

button{
font-size:16px;
padding:12px 22px;
}

}

</style>

</head>

<body>

<div class="balloon red"></div>
<div class="balloon blue"></div>
<div class="balloon green"></div>
<div class="balloon yellow"></div>
<div class="balloon purple"></div>

<div class="card">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>Dear Friend ❤️</h2>

<p>

May your birthday be filled with happiness,
love, laughter, and unforgettable memories.
Wishing you endless success and joy in life!
Have an amazing day! 🎂🎁🥳

</p>

<button onclick="surprise()">🎁 Open Gift</button>

<div id="message">

🎊 You are amazing! May all your dreams come true! ❤️✨

</div>

</div>

<script>

// Confetti at start

function startConfetti(){

var duration=6*1000;
var animationEnd=Date.now()+duration;

(function frame(){

confetti({

particleCount:7,
angle:60,
spread:55,
origin:{x:0}

});

confetti({

particleCount:7,
angle:120,
spread:55,
origin:{x:1}

});

if(Date.now()<animationEnd){

requestAnimationFrame(frame);

}

})();

}

startConfetti();

function surprise(){

document.getElementById("message").style.display="block";

confetti({

particleCount:250,
spread:180,
startVelocity:50,
origin:{y:.6}

});

}

</script>

</body>
</html>
